services:
  master-server:
    build:
      context: ./master-server
      dockerfile: Dockerfile
    container_name: master-server-app
    environment:
      - MASTER_SERVER_LLM_PROVIDER=${MASTER_SERVER_LLM_PROVIDER:-}
      - MASTER_SERVER_LLM_MODEL=${MASTER_SERVER_LLM_MODEL:-}
      - MASTER_SERVER_LLM_API_KEY=${MASTER_SERVER_LLM_API_KEY:-}
      - MASTER_SERVER_FRONTEND_PORT=${MASTER_SERVER_FRONTEND_PORT:-80}
      - MASTER_SERVER_BACKEND_PORT=${MASTER_SERVER_BACKEND_PORT:-8080}
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - ./master-server/user:/app/master-server/user
      - ./data:/app/data
    restart: always

  review-agent:
    build:
      context: ./review-agent
      dockerfile: Dockerfile
    container_name: review-agent-app
    environment:
      - MASTER_SERVER_LLM_PROVIDER=${MASTER_SERVER_LLM_PROVIDER:-}
      - MASTER_SERVER_LLM_MODEL=${MASTER_SERVER_LLM_MODEL:-}
      - MASTER_SERVER_LLM_API_KEY=${MASTER_SERVER_LLM_API_KEY:-}
      - REVIEW_SERVER_LLM_PROVIDER=${REVIEW_SERVER_LLM_PROVIDER:-}
      - REVIEW_SERVER_LLM_MODEL=${REVIEW_SERVER_LLM_MODEL:-}
      - REVIEW_SERVER_LLM_API_KEY=${REVIEW_SERVER_LLM_API_KEY:-}
      - REVIEW_SERVER_FRONTEND_PORT=${REVIEW_SERVER_FRONTEND_PORT:-8091}
      - REVIEW_SERVER_BACKEND_PORT=${REVIEW_SERVER_BACKEND_PORT:-8090}
    ports:
      - "8090:8090"
      - "8091:8091"
    volumes:
      - ./review-agent/user:/app/review-agent/user
      - ./data:/app/data
    restart: always

services:
  master-server:
    build:
      context: ./master-server
      dockerfile: Dockerfile
    container_name: master-server-app
    environment:
      - MASTER_SERVER_LLM_PROVIDER=${MASTER_SERVER_LLM_PROVIDER:-https://api.openai.com/v1}
      - MASTER_SERVER_LLM_MODEL=${MASTER_SERVER_LLM_MODEL:-gpt-5.4}
      - MASTER_SERVER_LLM_API_KEY=${MASTER_SERVER_LLM_API_KEY:-}
      - MASTER_SERVER_BACKEND_PORT=18081
    ports:
      - "127.0.0.1:18080:18081"
      - "127.0.0.1:18081:18081"
    volumes:
      - ./master-server/local_data:/app/master-server/local_data
      - ./data/vocabulary:/app/data/vocabulary
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18081/api/config', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: always

  knotodo:
    build:
      context: ./knotodo
      dockerfile: Dockerfile
      args:
        APT_MIRROR_BASE: ${KNOTODO_APT_MIRROR_BASE:-https://mirrors.tuna.tsinghua.edu.cn}
        NPM_REGISTRY: ${KNOTODO_NPM_REGISTRY:-https://registry.npmmirror.com}
        PIP_INDEX_URL: ${KNOTODO_PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        VITE_BASE_PATH: /todo/
    container_name: knotodo-app
    user: "${KNOTODO_UID:-1000}:${KNOTODO_GID:-1000}"
    environment:
      - KNOTODO_BACKEND_PORT=18083
      - KNOTODO_LOG_LEVEL=${KNOTODO_LOG_LEVEL:-INFO}
      - KNOTODO_SERVE_BUILT_FRONTEND=1
      - KNOTODO_DISABLE_FRONTEND=1
      - KNOTODO_BASE_PATH=/todo
      - KNOTODO_DB_FILE=/app/data/knotodo/state.json
      - KNOTODO_LOCK_FILE=/app/data/knotodo/state.json.lock
      - KNOTODO_DB_BACKUP_FILE=/app/data/knotodo/state.backup.json
    ports:
      - "127.0.0.1:18082:18083"
    volumes:
      - ./data/knotodo:/app/data/knotodo
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18083/todo/api/health', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: always

  qq-bot:
    profiles: ["qq-bot"]
    build:
      context: ./qq-bot
      dockerfile: Dockerfile
    container_name: qq-linkualog-bot
    environment:
      - QQ_APP_ID=${QQ_APP_ID:-}
      - QQ_APP_SECRET=${QQ_APP_SECRET:-}
      - MASTER_SERVER_LLM_PROVIDER=${MASTER_SERVER_LLM_PROVIDER:-https://api.openai.com/v1}
      - MASTER_SERVER_LLM_MODEL=${MASTER_SERVER_LLM_MODEL:-gpt-5.4}
      - MASTER_SERVER_LLM_API_KEY=${MASTER_SERVER_LLM_API_KEY:-}
      - QQ_LINKUALOG_BASE_URL=http://master-server:18081
      - QQ_LINKUALOG_DATA_DIR=/app/data/vocabulary
      - QQ_KNOTODO_BASE_URL=http://knotodo:18083/todo
      - QQ_KNOTODO_PUBLIC_URL=${QQ_KNOTODO_PUBLIC_URL:-}
      - QQ_LOCAL_DATA_DIR=/app/qq-bot/local_data
      - QQ_SESSION_STATE_FILE=/app/qq-bot/local_data/session_state.json
    depends_on:
      master-server:
        condition: service_healthy
      knotodo:
        condition: service_healthy
    volumes:
      - ./qq-bot/local_data:/app/qq-bot/local_data
      - ./data/vocabulary:/app/data/vocabulary:ro
    restart: always

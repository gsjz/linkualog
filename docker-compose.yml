services:
  master-server:
    build:
      context: ./master-server
      dockerfile: Dockerfile
    container_name: master-server-app
    environment:
      - MASTER_SERVER_LLM_PROVIDER=${MASTER_SERVER_LLM_PROVIDER:-https://api.openai.com/v1/chat/completions}
      - MASTER_SERVER_LLM_MODEL=${MASTER_SERVER_LLM_MODEL:-gpt-5.4}
      - MASTER_SERVER_LLM_API_KEY=${MASTER_SERVER_LLM_API_KEY:-}
    ports:
      - "80:8080"
      - "8080:8080"
    volumes:
      - ./master-server/local_data:/app/master-server/local_data
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/config', timeout=5).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: always

  qq-bot:
    profiles: ["qq-bot"]
    build:
      context: ./qq-bot
      dockerfile: Dockerfile
    container_name: qq-linkualog-bot
    environment:
      - QQ_APP_ID=${QQ_APP_ID:-}
      - QQ_APP_SECRET=${QQ_APP_SECRET:-}
      - MASTER_SERVER_LLM_PROVIDER=${MASTER_SERVER_LLM_PROVIDER:-https://api.openai.com/v1/chat/completions}
      - MASTER_SERVER_LLM_MODEL=${MASTER_SERVER_LLM_MODEL:-gpt-5.4}
      - MASTER_SERVER_LLM_API_KEY=${MASTER_SERVER_LLM_API_KEY:-}
      - QQ_LINKUALOG_BASE_URL=http://master-server:8080
      - QQ_LINKUALOG_DATA_DIR=/app/data
      - QQ_LOCAL_DATA_DIR=/app/qq-bot/local_data
      - QQ_SESSION_STATE_FILE=/app/qq-bot/local_data/session_state.json
    depends_on:
      master-server:
        condition: service_healthy
    volumes:
      - ./qq-bot/local_data:/app/qq-bot/local_data
      - ./data:/app/data:ro
    restart: always
